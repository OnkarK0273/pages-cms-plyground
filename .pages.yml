media:
  input: src/media
  output: /media
content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text
      - name: sections
        label: Sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: hero
            component: hero
          - name: text
            fields:
              - name: body
                type: rich-text
          
  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - name: title
        type: string
      - name: description
        type: text
      - name: url
        type: string