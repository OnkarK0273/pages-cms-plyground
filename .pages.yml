media:
  input: src/media
  output: /media
content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text
      - name: sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: cta
            fields:
              - name: button
                type: object
                fields:
                  - name: label
                    type: string
                  - name: url
                    type: string
      - name: sections
        type: object
        list:
          min: 1
          max: 6
          collapsible:
            collapsed: true
            summary: "{title} ({index})"
        fields:
          - name: title
            type: string
          - name: body
            type: rich-text
          
  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - name: title
        type: string
      - name: description
        type: text
      - name: url
        type: string